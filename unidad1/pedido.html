<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Pedido</title>

    <link rel="stylesheet" href="pedido.css">
</head>
<body>

    <!-- HEADER -->

    <header>

        <div>
            <h1>Acomaina</h1>
            <p>Mesa 4 - Pedido Actual</p>
        </div>

        <a href="menu.html" class="btn-volver">
            Volver al Menú
        </a>

    </header>

    <!-- CONTENEDOR -->

    <section class="pedido-contenedor">

        <!-- PRODUCTOS -->

        <div class="productos">

            <h2>Resumen del Pedido</h2>

            <!-- ITEM -->

            <div class="item">

                <img src="https://www.machupicchu.biz/imagenes/articulos/plato-lechon-al-horno.jpg" alt="Lechón">

                <div class="detalle">

                    <h3>Lechón al Horno</h3>

                    <p>
                        Cantidad: 2
                    </p>
                    
                    <div class="controles">

    <button>-</button>

    <span>2</span>

    <button>+</button>

</div>

<button class="eliminar">
    Eliminar
</button>

                </div>

                <div class="subtotal">
                    S/ 50.00
                </div>

            </div>

            <!-- ITEM -->

            <div class="item">

                <img src="https://seniorblue.pe/wp-content/uploads/2023/06/CERVEZA-PILZEN.jpg" alt="Pilsen">

                <div class="detalle">

                    <h3>Cerveza Pilsen</h3>

                    <p>
                        Cantidad: 1
                    </p>
                    <div class="controles">

    <button>-</button>

    <span>1</span>

    <button>+</button>

</div>

<button class="eliminar">
    Eliminar
</button>

                </div>

                <div class="subtotal">
                    S/ 15.00
                </div>

            </div>

            <!-- ITEM -->

            <div class="item">

                <img src="https://www.paulinacocina.net/wp-content/uploads/2024/05/cordero-lechal-al-horno-paulina-cocina-recetas-800x450.jpg" alt="Cordero">

                <div class="detalle">

                    <h3>Cordero al Horno</h3>

                    <p>
                        Cantidad: 1
                    </p>
                    <div class="controles">

    <button>-</button>

    <span>2</span>

    <button>+</button>

</div>

<button class="eliminar">
    Eliminar
</button>

                </div>

                <div class="subtotal">
                    S/ 25.00
                </div>

            </div>

        </div>

        <!-- RESUMEN -->

        <div class="resumen">

            <h2>Total</h2>

            <div class="fila">
                <span>Productos</span>
                <span>5</span>
            </div>

            <div class="fila">
                <span>Subtotal</span>
                <span>S/ 90.00</span>
            </div>

            <div class="fila total">
                <span>Total</span>
                <span>S/ 90.00</span>
            </div>

            <button class="btn-enviar">
                Enviar Pedido
            </button>

        </div>

    </section>

</body>
</html>
